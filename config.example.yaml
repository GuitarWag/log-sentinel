poll_interval: 30s   # default, overridable per app
applications:
  - name: my-api
    source: gcp
    project: my-gcp-project
    filter: 'resource.type="k8s_container" severity>=ERROR'
    poll_interval: 60s  # optional override
  - name: payments
    source: aws
    region: us-east-1
    log_group: /ecs/payments
    filter_pattern: "ERROR"
    poll_interval: 30s

aws:
  region: us-east-1
  bedrock_model: amazon.nova-micro-v1:0   # cheap+fast, can override
  sqs_queue_url: https://sqs.us-east-1.amazonaws.com/123/log-sentinel
